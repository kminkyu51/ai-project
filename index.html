<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리학교 AI 융합 학사안내 챗봇</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="chat-wrapper">
        <header class="chat-header">
            <h2>🏫 학사안내 AI 챗봇</h2>
            <p>성서학·AI융합·사회복지·영유아보육·간호학과 정보 제공</p>
        </header>

        <main class="chat-container" id="chat-container">
            <div class="message bot">
                <div class="bubble">안녕하세요! 우리 학교 학과 정보, 교수님 경력, 졸업 학점 등에 대해 무엇이든 물어보세요!</div>
            </div>
        </main>

        <footer class="input-container">
            <div class="input-box">
                <input type="text" id="user-input" placeholder="질문을 입력하세요... (예: 간호학과 졸업학점 알려줘)" autocomplete="off">
                <button id="send-btn">전송</button>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
